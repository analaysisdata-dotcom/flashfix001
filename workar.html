<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashFix Partner | Raza Sir</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; padding: 20px; }
        .job-card { background: #151515; padding: 20px; border-radius: 15px; border-left: 5px solid #FFD700; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; }
        button { padding: 15px; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-accept { background: #FFD700; color: black; }
        .btn-done { background: #00C853; color: white; }
        .btn-maps { background: #4285F4; color: white; text-decoration: none; display: block; text-align: center; margin-top: 10px; border-radius: 10px; padding: 15px; font-weight: bold; }
        .btn-logout { background: #333; color: #ff4444; font-size: 12px; padding: 5px 15px; width: auto; margin: 0; }
        
        #qr-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; text-align: center; padding-top: 20px; }
        .qr-box { background: white; color: black; padding: 20px; border-radius: 20px; width: 85%; margin: auto; max-width: 350px; }
        .qr-box img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" loop></audio>

    <div id="login-screen">
        <h1 style="color:#FFD700;">👷 Partner Login</h1>
        <p style="color:#888; font-size:14px;">Enter registered mobile to start duty</p>
        <input type="tel" id="worker-phone" placeholder="Mobile Number">
        <button class="btn-accept" onclick="login()">START DUTY</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #222; padding-bottom:10px; margin-bottom:20px;">
            <div>
                <h2 id="worker-skill" style="margin:0; font-size:18px;">Dashboard</h2>
                <span style="color:#00C853; font-size:12px;">● Online & Active</span>
            </div>
            <button class="btn-logout" onclick="logout()">OFF DUTY</button>
        </div>
        <div id="jobs-list">Searching for jobs...</div>
    </div>

    <div id="qr-overlay">
        <div class="qr-box">
            <h3 style="margin-top:0;">Scan to Pay Raza Sir</h3>
            <img src="QR code.jpeg" alt="Raza Sir QR Code">
            <h1 id="qr-amount" style="margin:5px 0; color:#d32f2f;">₹0</h1>
            <p style="font-size:12px; color:#555;">UPI ID: abdullaraza96@okhdfcbank</p>
            <button class="btn-done" onclick="finalSubmit()">CONFIRM PAYMENT DONE</button>
        </div>
    </div>

    <script>
        const API = "https://flashfix001.onrender.com";
        let myPhone = "", mySkill = "", currentJobId = 0, currentAmount = 0, currentMode = "";
        let isBeeping = false;

        // --- CHECK LOGIN ON LOAD ---
        window.onload = function() {
            const savedPhone = localStorage.getItem("workerPhone");
            if(savedPhone) {
                myPhone = savedPhone;
                autoLogin(savedPhone);
            }
        };

        async function login() {
            const phoneInput = document.getElementById('worker-phone').value;
            if(!phoneInput) return alert("Enter phone number!");
            
            const res = await fetch(`${API}/get-data`);
            const data = await res.json();
            const worker = data.workers.find(w => w.phone === phoneInput);
            
            if (worker) {
                localStorage.setItem("workerPhone", phoneInput); // Save to phone memory
                myPhone = phoneInput;
                setupDashboard(worker.skill);
            } else { alert("Mobile number not registered by Raza Sir!"); }
        }

        async function autoLogin(phone) {
            const res = await fetch(`${API}/get-data`);
            const data = await res.json();
            const worker = data.workers.find(w => w.phone === phone);
            if (worker) {
                setupDashboard(worker.skill);
            } else {
                localStorage.removeItem("workerPhone");
                location.reload();
            }
        }

        function setupDashboard(skill) {
            mySkill = skill;
            document.getElementById('worker-skill').innerText = "Expert: " + mySkill;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            // Enable sound logic
            document.getElementById('notif-sound').play().then(() => document.getElementById('notif-sound').pause()).catch(() => {});
            loadJobs();
        }

        function logout() {
            if(confirm("Ghar ja rahe ho? Off-Duty hone ke baad kaam nahi dikhega.")) {
                localStorage.removeItem("workerPhone");
                location.reload();
            }
        }

        async function loadJobs() {
            setInterval(async () => {
                try {
                    const res = await fetch(`${API}/get-data`);
                    const data = await res.json();
                    const list = document.getElementById('jobs-list');
                    const sound = document.getElementById('notif-sound');
                    
                    const active = data.bookings.find(j => j.assigned_to === myPhone && j.status === "Accepted");
                    if (active) {
                        sound.pause();
                        isBeeping = false;
                        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${active.lat},${active.lon}`;
                        list.innerHTML = `
                            <div class="job-card" style="border-color: #00C853;">
                                <h3 style="color:#00C853;">🟢 ONGOING JOB</h3>
                                <p><b>Address:</b> ${active.address}</p>
                                <a href="${mapsUrl}" target="_blank" class="btn-maps">📍 OPEN GOOGLE MAPS</a>
                                <button class="btn-done" onclick="finishProcess(${active.id})">🏁 FINISH & BILL</button>
                            </div>`;
                        return;
                    }

                    const news = data.bookings.filter(j => j.service === mySkill && j.status === "Pending");
                    if (news.length > 0) {
                        if (!isBeeping) { sound.play().catch(() => {}); isBeeping = true; }
                    } else { sound.pause(); isBeeping = false; }

                    list.innerHTML = news.map(j => `
                        <div class="job-card">
                            <h3 style="color:#FFD700;">🔔 NEW REQUEST</h3>
                            <p><b>Area:</b> ${j.address}</p>
                            <button class="btn-accept" onclick="acceptJob(${j.id})">✅ ACCEPT JOB</button>
                        </div>
                    `).join('') || "<p style='color:#666; text-align:center;'>Waiting for new requests...</p>";
                } catch(e) { }
            }, 3000);
        }

        async function acceptJob(id) {
            await fetch(`${API}/update-job/${id}/${myPhone}/Accepted`, { method: 'POST' });
            document.getElementById('notif-sound').pause();
            isBeeping = false;
        }

        function finishProcess(id) {
            const amt = prompt("Total Bill Amount (₹):");
            if (!amt) return;
            currentJobId = id;
            currentAmount = amt;
            const mode = confirm("Online Payment (OK) ya Cash (Cancel)?");
            if (mode) {
                currentMode = "Online";
                document.getElementById('qr-amount').innerText = "₹" + amt;
                document.getElementById('qr-overlay').style.display = 'block';
            } else {
                currentMode = "Cash";
                alert(`CASH COLLECTED!\nNote: 10% (₹${amt * 0.1}) Sir ko dena hai.`);
                finalSubmit();
            }
        }

        async function finalSubmit() {
            await fetch(`${API}/complete-job/${currentJobId}/${currentAmount}/${currentMode}`, { method: 'POST' });
            document.getElementById('qr-overlay').style.display = 'none';
            alert("Job Completed!");
        }
    </script>
</body>
</html>
