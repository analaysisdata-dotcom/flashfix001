<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashFix Business Manager | Raza Sir</title>
    <style>
        :root { --bg: #000; --card: #111; --gold: #FFD700; --red: #ff4444; --green: #25D366; --blue: #4285F4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        
        /* 🔒 Login Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-box { text-align: center; border: 1px solid var(--gold); padding: 40px; border-radius: 15px; background: #111; }
        .pass-input { padding: 15px; font-size: 18px; text-align: center; border-radius: 5px; border: 1px solid #555; background: #222; color: white; margin-bottom: 20px; width: 250px; }
        
        #dashboard { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .stat-val { font-size: 20px; color: var(--gold); font-weight: bold; margin-top: 5px; }
        .stat-label { color: #888; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; }

        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; overflow-x: auto; }
        input, select { padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 6px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        button { padding: 12px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; border-radius: 6px; color: black; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 400px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; font-size: 12px; }
        th { color: var(--gold); font-size: 10px; text-transform: uppercase; }
        
        .btn-pay { background: var(--green); color: white; border-radius: 4px; border: none; padding: 5px 8px; cursor: pointer; font-size: 10px; }
        .btn-remove { background: var(--red); color: white; border-radius: 4px; border: none; padding: 5px 8px; cursor: pointer; font-size: 10px; margin-left: 5px; }
        
        #payout-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .payout-box { background: white; color: black; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 350px; }
        .payout-box img { width: 220px; border-radius: 10px; margin: 15px 0; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1 style="color:var(--gold);">💰 RAZA SIR'S OFFICE</h1>
            <input type="password" id="admin-pass" class="pass-input" placeholder="Enter Admin PIN">
            <button onclick="checkLogin()">UN-LOCK ACCESS</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <h1>⚡ Finance <span>Panel</span></h1>
            <button onclick="logout()" style="background:#333; color:white; width: auto; padding: 5px 15px; border-radius: 5px;">Logout</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Total Biz (All Time)</div><div class="stat-val" id="total-biz">₹0</div></div>
            <div class="stat-card"><div class="stat-label">Net Profit (10%)</div><div class="stat-val" id="total-profit" style="color:var(--green)">₹0</div></div>
            <div class="stat-card"><div class="stat-label">In Bank (QR)</div><div class="stat-val" id="bank-money" style="color:var(--blue)">₹0</div></div>
            <div class="stat-card"><div class="stat-label">In Market (Cash)</div><div class="stat-val" id="market-cash" style="color:var(--red)">₹0</div></div>
        </div>

        <div class="card">
            <h3 style="color:var(--gold); margin-top:0;">➕ Add New Worker</h3>
            <input type="text" id="w-name" placeholder="Full Name">
            <input type="tel" id="w-phone" placeholder="Mobile Number">
            <select id="w-skill">
                <option value="Electrician">Electrician</option>
                <option value="Plumber">Plumber</option>
                <option value="AC Repair">AC Repair</option>
                <option value="Carpenter">Carpenter</option>
                <option value="Painter">Painter</option>
                <option value="Cleaning">Cleaning</option>
            </select>
            <input type="text" id="w-upi" placeholder="Worker UPI ID">
            <button onclick="addWorker()">SAVE PARTNER</button>
        </div>

        <div class="card">
            <h3>📋 Outstanding Balance (Dena/Lena)</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>Partner</th><th>Dena (90%)</th><th>Lena (10%)</th><th>Actions</th></tr></thead>
                    <tbody id="worker-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="payout-modal">
        <div class="payout-box">
            <h3 id="payout-worker-name" style="margin:0">Worker Payout</h3>
            <div id="payout-qr-container"></div>
            <h2 id="payout-amount" style="margin:10px 0; color:var(--green);">₹0</h2>
            <button id="mark-paid-btn" style="background:var(--green); color:white; margin-bottom:10px;">✅ MARK AS SETTLED</button>
            <button onclick="document.getElementById('payout-modal').style.display='none'" style="background:#eee; color:#333;">CLOSE</button>
        </div>
    </div>

    <script>
        const API = "https://flashfix001.onrender.com";
        const SECRET_PIN = "Islamiya.@0786"; 

        // 🔄 Page load hone par check karein ki kya pehle se logged in hain
        window.onload = () => { 
            if(localStorage.getItem("adminLoggedIn") === "true") {
                showDashboard(); 
            }
        };

        function checkLogin() {
            const pin = document.getElementById('admin-pass').value;
            if(pin === SECRET_PIN) {
                localStorage.setItem("adminLoggedIn", "true"); // Session Save
                showDashboard();
            } else { 
                alert("❌ Incorrect PIN! Access Denied."); 
            }
        }

        function logout() {
            if(confirm("Logout karke panel lock karein?")) {
                localStorage.removeItem("adminLoggedIn"); // Session Delete
                location.reload(); // Page refresh karein login screen par jane ke liye
            }
        }

        function showDashboard() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadData();
        }

        async function loadData() {
            try {
                const res = await fetch(`${API}/get-data`);
                const data = await res.json();
                const workerLedger = {};
                data.workers.forEach(w => { workerLedger[w.phone] = { name: w.name, upi: w.upi, deno: 0, leno: 0 }; });

                let totalBiz = 0, bankMoney = 0, marketCash = 0;

                data.bookings.forEach(j => {
                    const amt = parseFloat(j.final_amount) || 0;
                    if(j.status === "Completed" || j.status === "Settled") {
                        totalBiz += amt;
                        if(j.payment_mode === "Online") bankMoney += amt; else marketCash += amt;
                        if(j.status === "Completed" && workerLedger[j.assigned_to]) {
                            if(j.payment_mode === "Online") workerLedger[j.assigned_to].deno += (amt * 0.90);
                            else workerLedger[j.assigned_to].leno += (amt * 0.10);
                        }
                    }
                });

                document.getElementById('total-biz').innerText = "₹" + totalBiz.toFixed(0);
                document.getElementById('total-profit').innerText = "₹" + (totalBiz * 0.10).toFixed(0);
                document.getElementById('bank-money').innerText = "₹" + bankMoney.toFixed(0);
                document.getElementById('market-cash').innerText = "₹" + marketCash.toFixed(0);

                document.getElementById('worker-list').innerHTML = Object.keys(workerLedger).map(ph => {
                    const w = workerLedger[ph];
                    return `<tr>
                        <td><b>${w.name}</b><br><small>${ph}</small></td>
                        <td style="color:var(--red)">₹${w.deno.toFixed(0)}</td>
                        <td style="color:var(--green)">₹${w.leno.toFixed(0)}</td>
                        <td>
                            <button class="btn-pay" onclick="openPayout('${w.name}','${ph}','${w.upi}',${w.deno.toFixed(0)})">💸 PAY</button>
                            <button class="btn-remove" onclick="removeWorker('${ph}')">🗑️</button>
                        </td>
                    </tr>`;
                }).join('');
            } catch(e) { console.log("Server not reachable"); }
        }

        function openPayout(name, ph, upi, amt) {
            const upiUrl = `upi://pay?pa=${upi}&pn=${encodeURIComponent(name)}&am=${amt}&cu=INR`;
            document.getElementById('payout-qr-container').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiUrl)}">`;
            document.getElementById('payout-worker-name').innerText = "Pay " + name;
            document.getElementById('payout-amount').innerText = "₹" + amt;
            document.getElementById('mark-paid-btn').onclick = () => markAsPaid(ph);
            document.getElementById('payout-modal').style.display = 'flex';
        }

        async function markAsPaid(phone) {
            if(confirm("Settle account? Balance will be zero but stats remain.")) {
                await fetch(`${API}/clear-ledger/${phone}`, { method: 'POST' });
                document.getElementById('payout-modal').style.display = 'none';
                loadData();
            }
        }

        async function addWorker() {
            const n = document.getElementById('w-name').value, p = document.getElementById('w-phone').value, 
                  s = document.getElementById('w-skill').value, u = document.getElementById('w-upi').value;
            if(!n || !p || !u) return alert("Fill all details!");
            await fetch(`${API}/add-worker`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name:n, phone:p, skill:s, upi:u}) });
            alert("Worker Added!"); loadData();
        }

        async function removeWorker(phone) {
            if(confirm("Remove this worker permanently?")) {
                await fetch(`${API}/delete-worker/${phone}`, { method: 'DELETE' });
                loadData();
            }
        }
    </script>
</body>
</html>
